services:
  postgres:
    image: postgres:17-alpine
    container_name: tracking-okrs-postgres
    environment:
      POSTGRES_DB: tracking_okrs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d tracking_okrs']
      interval: 5s
      timeout: 5s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.66.0
    container_name: tracking-okrs-jaeger
    ports:
      - '16686:16686'
      - '4317:4317'
      - '4318:4318'

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: tracking-okrs-api
    environment:
      NODE_ENV: development
      PORT: 4000
      APP_ORIGIN: http://localhost
      SESSION_SECRET: development-session-secret
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: tracking_okrs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      GITHUB_CLIENT_ID: change-me
      GITHUB_CLIENT_SECRET: change-me
      GITHUB_CALLBACK_URL: http://localhost/api/v1/auth/github/callback
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
    expose:
      - '4000'

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    container_name: tracking-okrs-web
    depends_on:
      api:
        condition: service_started
    expose:
      - '5173'

  nginx:
    image: nginx:1.27-alpine
    container_name: tracking-okrs-nginx
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
    ports:
      - '8080:80'
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
